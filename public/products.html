<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Історія постів — Postly</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo">
          <div class="logo-icon">✦</div>
          <span class="logo-name">Postly</span>
        </div>
        <div class="topbar-divider"></div>
        <span class="badge">Історія</span>
      </div>
      <a href="/stats.html" class="btn ghost">Статистика</a>
      <a href="/setup.html" class="btn ghost">⚙ Налаштування</a>
      <a href="/app.html" class="btn secondary">+ Новий товар</a>
    </header>

    <div class="page-body">
      <section class="card filters">
        <input
          type="search"
          id="productsSearch"
          placeholder="Пошук за назвою або артикулом..."
        />
        <select id="platformFilter">
          <option value="">Усі платформи</option>
          <option value="telegram">Telegram</option>
          <option value="instagram">Instagram</option>
          <option value="facebook">Facebook</option>
          <option value="shafa">Shafa.ua</option>
        </select>
        <select id="statusFilter">
          <option value="">Усі статуси</option>
          <option value="draft">Чернетка</option>
          <option value="scheduled">Заплановано</option>
          <option value="publishing">Публікується</option>
          <option value="published">Опубліковано</option>
          <option value="failed">Помилка</option>
        </select>
      </section>

      <section id="productsList" class="products-list">Завантаження...</section>
    </div>
    <footer class="legal-footer">
      <a href="/privacy.html">Privacy Policy</a>
      <a href="/terms.html">Terms of Service</a>
      <a href="/data-deletion.html">Data Deletion</a>
    </footer>
  </div>

  <script src="/products.js"></script>
</body>
</html>
