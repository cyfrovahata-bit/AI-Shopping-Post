<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вхід — AI Shopping Post</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,.1); padding: 40px; width: 100%; max-width: 400px; }
    h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 28px; }
    .tabs { display: flex; gap: 0; border-bottom: 2px solid #eee; margin-bottom: 24px; }
    .tab { padding: 8px 20px; cursor: pointer; font-size: 15px; font-weight: 500; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
    .tab.active { color: #111; border-bottom-color: #111; }
    label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; transition: border-color .15s; margin-bottom: 16px; }
    input:focus { border-color: #111; }
    button[type=submit] { width: 100%; padding: 12px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s; }
    button[type=submit]:hover { background: #333; }
    button[type=submit]:disabled { background: #999; cursor: not-allowed; }
    .error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; font-size: 14px; margin-bottom: 16px; display: none; }
    .error.show { display: block; }
    .legal-footer { position: fixed; left: 0; right: 0; bottom: 18px; display: flex; justify-content: center; gap: 14px; font-size: 12px; }
    .legal-footer a { color: #666; text-decoration: none; }
    .legal-footer a:hover { color: #111; }
  </style>
</head>
<body>
<div class="card">
  <h1>AI Shopping Post</h1>
  <p class="subtitle">Автоматична публікація товарів</p>

  <div class="tabs">
    <div class="tab active" onclick="setTab('login')">Вхід</div>
    <div class="tab" onclick="setTab('register')">Реєстрація</div>
  </div>

  <div id="errorBox" class="error"></div>

  <form id="loginForm" onsubmit="submitLogin(event)">
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="your@email.com" required autocomplete="email">
    <label>Пароль</label>
    <input type="password" id="loginPassword" placeholder="Пароль" required autocomplete="current-password">
    <button type="submit" id="loginBtn">Увійти</button>
  </form>

  <form id="registerForm" style="display:none" onsubmit="submitRegister(event)">
    <label>Email</label>
    <input type="email" id="regEmail" placeholder="your@email.com" required autocomplete="email">
    <label>Пароль</label>
    <input type="password" id="regPassword" placeholder="Мінімум 6 символів" required autocomplete="new-password">
    <button type="submit" id="registerBtn">Зареєструватись</button>
  </form>
</div>
<footer class="legal-footer">
  <a href="/privacy.html">Privacy Policy</a>
  <a href="/terms.html">Terms of Service</a>
  <a href="/data-deletion.html">Data Deletion</a>
</footer>

<script>
  // Redirect if already logged in
  const tok = localStorage.getItem('authToken');
  if (tok) window.location.replace('/');

  function setTab(tab) {
    document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
    document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', (i===0) === (tab==='login')));
    hideError();
  }

  function showError(msg) {
    const el = document.getElementById('errorBox');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError() { document.getElementById('errorBox').classList.remove('show'); }

  async function submitLogin(e) {
    e.preventDefault();
    hideError();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Завантаження...';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Помилка входу');
      localStorage.setItem('authToken', data.token);
      localStorage.setItem('userEmail', data.email);
      window.location.replace('/');
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = 'Увійти';
    }
  }

  async function submitRegister(e) {
    e.preventDefault();
    hideError();
    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.textContent = 'Завантаження...';
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Помилка реєстрації');
      localStorage.setItem('authToken', data.token);
      localStorage.setItem('userEmail', data.email);
      window.location.replace('/');
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = 'Зареєструватись';
    }
  }
</script>
</body>
</html>
